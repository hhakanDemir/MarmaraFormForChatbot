<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marmara Universitesi - Ogrenci Asistani</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="header">
        <div class="header-content">
            <div class="logo-area">
                <div class="logo-icon">MU</div>
                <div class="header-text">
                    <h1>Marmara Universitesi</h1>
                    <p>Ogrenci Asistani</p>
                </div>
            </div>
        </div>
    </header>

    <main class="main-container">
        <!-- Ogrenci Bilgi Formu -->
        <section class="info-panel" id="infoPanel">
            <h2>Ogrenci Bilgileri</h2>
            <form id="studentForm">
                <div class="form-group">
                    <label for="adSoyad">Ad Soyad</label>
                    <input type="text" id="adSoyad" name="adSoyad" required placeholder="Adinizi ve soyadinizi girin" maxlength="100" autocomplete="name">
                </div>
                <div class="form-group">
                    <label for="ogrenciNo">Ogrenci Numarasi</label>
                    <input type="text" id="ogrenciNo" name="ogrenciNo" required placeholder="Ornek: 2024123456" maxlength="20" pattern="[0-9]{6,20}" title="Ogrenci numarasi sadece rakamlardan olusmalidir">
                </div>
                <div class="form-group">
                    <label for="bolum">Bolum</label>
                    <input type="text" id="bolum" name="bolum" required placeholder="Bolumunuzu girin" maxlength="150">
                </div>
                <div class="form-group">
                    <label for="email">E-posta Adresi</label>
                    <input type="email" id="email" name="email" required placeholder="ornek@marun.edu.tr" maxlength="100" autocomplete="email">
                </div>
                <button type="submit" class="btn-start" id="btnStart">Sohbeti Baslat</button>
            </form>
        </section>

        <!-- Chat Alani -->
        <section class="chat-panel" id="chatPanel">
            <div class="chat-header">
                <span class="student-name" id="studentNameDisplay"></span>
                <button class="btn-reset" id="btnReset" title="Yeni oturum">Cikis</button>
            </div>
            <div class="chat-messages" id="chatMessages">
                <div class="message bot-message">
                    <div class="message-content">
                        Merhaba! Marmara Universitesi ogrenci asistaniyim. Yonetmelikler, akademik takvim ve diger konularda sorularinizi yanıtlayabilirim. Nasil yardimci olabilirim?
                    </div>
                </div>
            </div>
            <div class="chat-input-area">
                <form id="chatForm">
                    <div class="input-wrapper">
                        <textarea id="questionInput" placeholder="Sorunuzu yazin..." rows="1" required maxlength="1000"></textarea>
                        <button type="submit" class="btn-send" id="btnSend">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <line x1="22" y1="2" x2="11" y2="13"></line>
                                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                            </svg>
                        </button>
                    </div>
                </form>
            </div>
        </section>
    </main>

    <footer class="footer">
        <p>Marmara Universitesi Ogrenci Asistani &copy; 2026</p>
    </footer>

    <script src="js/app.js"></script>
</body>
</html>
